# Real-env smoke for frozen BCFlow base + random-init residual TD3 learner.

experiment:
  name: square_residual_td3_real_env_smoke
  seed: 0
  output_dir: exp/smoke
  tags:
    - square
    - smoke
    - residual
    - td3
    - bcflow_base

env:
  kind: robomimic
  name: square-mh-low_dim
  observation_mode: lowdim
  max_episode_steps: 400
  render_offscreen: false
  reward_scale: 1.0
  reward_shift: 0.0
  build_eval_env: false
  eval_seed_offset: 10000

actors:
  base:
    kind: bc_flow
    trainable: false
    pretrained_path: exp/pretrained/bcflow_square_top50_actorln_seed0_500k
    checkpoint_step: 500000
    policy_view: true
    network: {}
    optimization: {}
    update: {}

  learner:
    kind: residual_td3
    trainable: true
    pretrained_path: null
    checkpoint_step: null
    policy_view: true
    network:
      actor_hidden_dims: [64, 64]
      critic_hidden_dims: [64, 64]
      actor_layer_norm: true
      critic_layer_norm: true
      horizon_length: 1
      action_chunking: false
      num_qs: 2
      residual_scale: 0.2
      residual_action_l2: 0.0
      actor_final_fc_init_scale: 0.0
    optimization:
      lr: 1.0e-4
      actor_lr: 1.0e-6
      critic_lr: 1.0e-4
      batch_size: 4
      grad_clip_norm: 1.0
    update:
      discount: 0.99
      tau: 0.005
      target_q_agg: min
      actor_q_agg: mean
      target_policy_noise: true
      target_noise_std: 0.05
      target_noise_clip: 0.3
      exploration_noise: 0.05
      exploration_noise_clip: 0.3
      bc_alpha: 0.0
      critic_warmup_steps: 4
      actor_update_interval: 4

training:
  total_steps: 20
  start_training: 8
  update_interval: 1
  updates_per_step: 1
  action_mode: first_action
  action_composition: residual
  residual_warmup_steps: 5
  warmup_noise_scale: 0.0
  use_base_policy_for_warmup: true
  reset_on_done: true

replay:
  buffers:
    online_size: 1024
    demo_size: 16
    intervention_size: 16
  prefill: {}
  routing:
    demo_insert_mode: none
    include_failed_interventions: false
  sampling:
    rl:
      source:
        online: 1.0
      sequence_length: 1
      batch_size: 4
      utd_ratio: 4
      boundary_mode: drop

intervention:
  enabled: false
  expert_query: never
  gate:
    kind: always_off

storage:
  store_executed_action: true
  store_learner_action: true
  store_expert_action: false
  store_log_prob: true
  store_gate_score: true
  store_episode_metadata: true

evaluation:
  interval: 0
  episodes: 0
  seed: 1000
  render_video: false
  video_episodes: 0
  action_mode: first_action

logging:
  stdout_interval: 10
  csv: true
  jsonl: true
  wandb:
    enabled: false
    project: intervention_learning
    group: smoke
    name: square_residual_td3_real_env_smoke_seed0
    tags:
      - smoke
      - residual_td3

checkpointing:
  interval: 0
  save_final: false
  save_replay: true
  keep_last: 1
