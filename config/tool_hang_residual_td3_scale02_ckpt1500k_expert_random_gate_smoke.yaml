# Real-env smoke for using the trained ToolHang residual TD3 checkpoint as an expert.
# The expert checkpoint is the scale=0.2 residual TD3 run evaluated at 1.5M steps.
# Legacy note: this full-agent checkpoint was trained before the critic-input fix and may not restore under the corrected residual critic shape.

experiment:
  name: tool_hang_residual_td3_scale02_ckpt1500k_expert_random_gate_smoke
  seed: 0
  output_dir: exp/smoke
  tags:
    - tool_hang
    - smoke
    - residual
    - td3_expert
    - scale02
    - ckpt1500k

_env_dataset: &tool_hang_dataset /home/junhyeong/.robomimic/tool_hang/ph/low_dim_v15.hdf5
_env_base: &tool_hang_base exp/pretrained/bcflow_tool_hang_ph_top200_actorln_seed0_1m
_td3_expert: &td3_expert exp/pretrained/residual_td3_tool_hang_ph_scale02_bc01_actorlr5e5_warmup01_seed0_1500k

env:
  kind: robomimic
  name: tool_hang-ph-low_dim
  observation_mode: lowdim
  max_episode_steps: 1000
  render_offscreen: false
  reward_scale: 1.0
  reward_shift: -1.0
  build_eval_env: false
  eval_seed_offset: 10000

actors:
  base:
    kind: bc_flow
    trainable: false
    pretrained_path: *tool_hang_base
    checkpoint_step: 1000000
    policy_view: true
    network: {}
    optimization: {}
    update: {}

  learner:
    kind: residual_td3
    trainable: true
    pretrained_path: null
    checkpoint_step: null
    policy_view: true
    network:
      actor_hidden_dims: [64, 64]
      critic_hidden_dims: [64, 64]
      actor_layer_norm: true
      critic_layer_norm: true
      horizon_length: 1
      action_chunking: false
      num_qs: 2
      residual_scale: 0.2
      residual_action_l2: 0.0
      actor_final_fc_init_scale: 0.0
    optimization:
      lr: 1.0e-4
      actor_lr: 5.0e-5
      critic_lr: 1.0e-4
      batch_size: 16
      grad_clip_norm: 1.0
    update:
      discount: 0.99
      tau: 0.005
      target_q_agg: min
      actor_q_agg: mean
      target_policy_noise: true
      target_noise_std: 0.05
      target_noise_clip: 0.3
      exploration_noise: 0.05
      exploration_noise_clip: 0.3
      bc_alpha: 0.0
      critic_warmup_steps: 10
      actor_update_interval: 4

  expert:
    kind: residual_td3
    trainable: false
    pretrained_path: *td3_expert
    checkpoint_step: 1500000
    policy_view: true
    network:
      actor_hidden_dims: [512, 512, 512, 512]
      critic_hidden_dims: [512, 512, 512, 512]
      actor_layer_norm: true
      critic_layer_norm: true
      horizon_length: 1
      action_chunking: false
      num_qs: 2
      residual_scale: 0.2
      residual_action_l2: 0.0
      actor_final_fc_init_scale: 0.0
    optimization:
      lr: 1.0e-4
      actor_lr: 5.0e-5
      critic_lr: 1.0e-4
      batch_size: 256
      grad_clip_norm: 1.0
    update:
      discount: 0.99
      tau: 0.005
      target_q_agg: min
      actor_q_agg: mean
      target_policy_noise: true
      target_noise_std: 0.05
      target_noise_clip: 0.3
      exploration_noise: 0.0
      exploration_noise_clip: 0.3
      bc_alpha: 0.1
      critic_warmup_steps: 10000
      actor_update_interval: 4

training:
  total_steps: 20
  start_training: 1000000
  update_interval: 1
  updates_per_step: 0
  action_mode: first_action
  action_composition: residual
  residual_warmup_steps: 0
  warmup_noise_scale: 0.0
  use_base_policy_for_warmup: false
  reset_on_done: true

replay:
  buffers:
    online_size: 1024
    demo_size: 16
    intervention_size: 16
  prefill: {}
  routing:
    demo_insert_mode: none
    include_failed_interventions: false
  sampling:
    rl:
      source:
        online: 1.0
      sequence_length: 1
      batch_size: 16
      boundary_mode: drop

intervention:
  enabled: true
  expert_query: always
  gate:
    kind: random
    expert_probability: 0.5

storage:
  store_executed_action: true
  store_learner_action: true
  store_expert_action: true
  store_log_prob: true
  store_gate_score: true
  store_episode_metadata: true

evaluation:
  interval: 0
  episodes: 0
  seed: 1000
  render_video: false
  video_episodes: 0
  action_mode: first_action

logging:
  stdout_interval: 10
  csv: true
  jsonl: true
  wandb:
    enabled: false
    project: intervention_learning
    group: smoke
    name: tool_hang_residual_td3_scale02_ckpt1500k_expert_random_gate_smoke_seed0
    tags:
      - smoke
      - residual_td3_expert
      - tool_hang
      - scale02
      - ckpt1500k

checkpointing:
  interval: 0
  save_final: false
  save_replay: true
  keep_last: 1
